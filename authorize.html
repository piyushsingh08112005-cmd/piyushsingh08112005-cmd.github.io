<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authorize Admin Access</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .box {
    background: #fff;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
  }

  .box h1 {
    color: #667eea;
    font-size: 1.8em;
    margin-bottom: 8px;
  }

  .box p {
    color: #666;
    font-size: 0.95em;
    margin-bottom: 25px;
    line-height: 1.5;
  }

  .form-group {
    text-align: left;
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    margin-bottom: 6px;
    color: #333;
    font-weight: 600;
    font-size: 0.9em;
  }

  .form-group input {
    width: 100%;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.95em;
    transition: all 0.3s;
  }

  .form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .form-group small {
    display: block;
    margin-top: 6px;
    color: #888;
    font-size: 0.8em;
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn:hover { background: #5568d3; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .back-link {
    display: inline-block;
    margin-top: 18px;
    color: #667eea;
    font-size: 0.85em;
    text-decoration: none;
  }

  .back-link:hover { text-decoration: underline; }

  #status {
    margin-top: 16px;
    font-size: 0.9em;
    min-height: 20px;
  }

  #status.success { color: #2e7d32; }
  #status.error { color: #c62828; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(102, 126, 234, 0.25);
    border-top-color: #667eea;
    border-radius: 50%;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="box">
  <h1>🔐 Authorize Access</h1>
  <p>Enter a GitHub Personal Access Token belonging to the repository owner to unlock the admin panel.</p>

  <form id="authForm">
    <div class="form-group">
      <label for="token">GitHub Personal Access Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" required autocomplete="off">
      <small>Create one at <strong>github.com/settings/tokens</strong> with the <strong>repo</strong> scope. Your token is stored only in this browser.</small>
    </div>
    <button type="submit" class="btn" id="authBtn">Authorize</button>
  </form>

  <div id="status"></div>

  <a href="admin.html" class="back-link">← Back to Admin Panel</a>
</div>

<script>
  const REPO_OWNER = 'piyushsingh08112005-cmd';
  const form = document.getElementById('authForm');
  const authBtn = document.getElementById('authBtn');
  const statusEl = document.getElementById('status');

  // If already authorized, bounce straight back to admin
  if (localStorage.getItem('adminAuth') === 'true') {
    window.location.replace('admin.html');
  }

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = type || '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = document.getElementById('token').value.trim();
    if (!token) return;

    authBtn.disabled = true;
    setStatus('Verifying token...', '');

    try {
      const res = await fetch('https://api.github.com/user', {
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });

      if (!res.ok) throw new Error('Invalid or expired token');
      const user = await res.json();

      if (user.login !== REPO_OWNER) {
        throw new Error('Only the repository owner can access this panel');
      }

      localStorage.setItem('adminAuth', 'true');
      localStorage.setItem('authMethod', 'github');
      localStorage.setItem('githubUser', JSON.stringify(user));
      localStorage.setItem('githubToken', token);

      setStatus('✅ Authorized! Redirecting...', 'success');
      setTimeout(() => {
        window.location.replace('admin.html');
      }, 800);
    } catch (err) {
      setStatus('❌ ' + err.message, 'error');
      authBtn.disabled = false;
    }
  });
</script>

<select id="lang">
  <option value="python">Python</option>
  <option value="cpp">C++</option>
  <option value="java">Java</option>
  <option value="javascript">JavaScript</option>
</select>

</body>
</html>
